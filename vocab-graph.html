<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif}
canvas{display:block}
#tooltip{
  position:fixed;pointer-events:none;opacity:0;transition:opacity .15s;
  background:rgba(15,23,42,.95);border:1px solid rgba(124,58,237,.6);
  border-radius:10px;padding:10px 14px;color:#f1f5f9;font-size:13px;
  backdrop-filter:blur(8px);box-shadow:0 4px 24px rgba(0,0,0,.5);
  max-width:220px;z-index:10;
}
#tooltip .tt-word{font-size:18px;font-weight:700;color:#f59e0b}
#tooltip .tt-romaji{font-size:12px;color:#a78bfa;margin-top:2px;font-style:italic}
#tooltip .tt-reading{font-size:13px;color:#94a3b8;margin-top:2px}
#tooltip .tt-meaning{font-size:12px;color:#cbd5e1;margin-top:4px}
#tooltip .tt-cat{font-size:11px;color:#7c3aed;margin-top:4px;font-weight:600}
#legend{
  position:fixed;bottom:16px;left:16px;background:rgba(15,23,42,.85);
  border:1px solid #334155;border-radius:12px;padding:12px 16px;
  color:#94a3b8;font-size:11px;backdrop-filter:blur(8px);z-index:5;
}
#legend h4{color:#f1f5f9;font-size:12px;margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:8px;margin:3px 0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#title-bar{
  position:fixed;top:0;left:0;right:0;padding:14px 20px;
  background:linear-gradient(180deg,rgba(15,23,42,.95),rgba(15,23,42,0));
  z-index:5;display:flex;justify-content:space-between;align-items:center;
}
#title-bar h1{
  font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#title-bar .sub{color:#64748b;font-size:12px}
#btn-reset{
  background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);
  color:#c4b5fd;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;
}
#btn-reset:hover{background:rgba(124,58,237,.35)}
#btn-quiz{
  background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);
  color:#fcd34d;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;
  margin-right:8px;
}
#btn-quiz:hover{background:rgba(245,158,11,.35)}

/* Quiz Modal */
#quiz-overlay{
  position:fixed;inset:0;z-index:100;display:none;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  justify-content:center;align-items:center;
  opacity:0;transition:opacity .3s ease;
}
#quiz-overlay.active{display:flex;opacity:1}
#quiz-modal{
  background:rgba(15,23,42,.97);border:1px solid rgba(124,58,237,.5);
  border-radius:16px;padding:28px 32px;color:#f1f5f9;
  max-width:440px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.6);
  transform:scale(.95);transition:transform .3s ease;
}
#quiz-overlay.active #quiz-modal{transform:scale(1)}
.quiz-title{font-size:18px;font-weight:700;margin-bottom:16px;
  background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.quiz-subtitle{font-size:12px;color:#94a3b8;margin-bottom:20px}
.quiz-word{font-size:32px;font-weight:700;text-align:center;margin:16px 0 4px;color:#f59e0b}
.quiz-romaji-display{font-size:14px;text-align:center;color:#a78bfa;font-style:italic;margin-bottom:12px}
.quiz-prompt{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:16px}
.quiz-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.quiz-choice{
  background:rgba(51,65,85,.4);border:1px solid rgba(100,116,139,.3);
  border-radius:10px;padding:10px 16px;color:#e2e8f0;font-size:14px;
  cursor:pointer;transition:all .2s ease;text-align:left;
}
.quiz-choice:hover{background:rgba(100,116,139,.3);border-color:rgba(124,58,237,.5)}
.quiz-choice.correct{background:rgba(16,185,129,.25);border-color:#10b981;color:#6ee7b7}
.quiz-choice.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fca5a5}
.quiz-choice.reveal{border-color:#10b981;color:#6ee7b7}
.quiz-score{font-size:13px;color:#94a3b8;text-align:right;margin-bottom:8px}
.quiz-progress-bar{width:100%;height:6px;background:rgba(51,65,85,.5);border-radius:3px;margin-bottom:16px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#f97316);border-radius:3px;transition:width .4s ease}
.quiz-type-label{font-size:13px;color:#a78bfa;margin-bottom:12px;font-weight:600;letter-spacing:.5px}
.quiz-sentence{font-size:20px;text-align:center;margin:16px 0;color:#f1f5f9;line-height:1.6;letter-spacing:1px}
.quiz-sentence .blank{color:#f59e0b;font-weight:700;border-bottom:2px dashed #f59e0b;padding:0 4px}
.quiz-explanation{font-size:12px;color:#94a3b8;margin-top:8px;text-align:center;font-style:italic;line-height:1.5}
.quiz-start-btn{
  display:block;width:100%;background:linear-gradient(135deg,rgba(245,158,11,.4),rgba(249,115,22,.4));
  border:1px solid rgba(245,158,11,.5);color:#fcd34d;border-radius:12px;
  padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease;
  margin-top:20px;letter-spacing:1px;
}
.quiz-start-btn:hover{background:linear-gradient(135deg,rgba(245,158,11,.6),rgba(249,115,22,.6));transform:scale(1.02)}
.quiz-choice{transition:all .25s ease;transform:scale(1)}
.quiz-choice:active{transform:scale(.97)}
.quiz-choice.correct{animation:correctPulse .5s ease}
.quiz-choice.wrong{animation:wrongShake .4s ease}
@keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)}}
.quiz-close{
  position:absolute;top:12px;right:16px;background:none;border:none;
  color:#64748b;font-size:20px;cursor:pointer;transition:color .2s;
}
.quiz-close:hover{color:#f1f5f9}
#kr-toggle{
  position:absolute;top:12px;left:16px;width:36px;height:36px;border-radius:10px;
  background:rgba(100,116,139,.3);border:1px solid rgba(100,116,139,.4);
  color:#94a3b8;font-size:15px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .25s ease;
  font-family:-apple-system,sans-serif;
}
#kr-toggle:hover{background:rgba(100,116,139,.5)}
#kr-toggle.active{background:rgba(59,130,246,.5);border-color:rgba(59,130,246,.7);color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.kr-sub{display:none;font-size:11px;color:#60a5fa;margin-top:2px;font-style:italic}
.kr-mode .kr-sub{display:block}
.quiz-choice .kr-sub{margin-top:1px;font-size:10px}
.quiz-btn{
  background:rgba(124,58,237,.3);border:1px solid rgba(124,58,237,.4);
  color:#c4b5fd;border-radius:8px;padding:8px 20px;font-size:12px;cursor:pointer;
  transition:all .2s ease;
}
.quiz-btn:hover{background:rgba(124,58,237,.5)}
.quiz-btn.primary{background:rgba(245,158,11,.3);border-color:rgba(245,158,11,.4);color:#fcd34d}
.quiz-btn.primary:hover{background:rgba(245,158,11,.5)}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.quiz-result{text-align:center;padding:20px 0}
.quiz-result-score{font-size:36px;font-weight:700;color:#f59e0b;margin:8px 0}
.quiz-result-label{font-size:14px;color:#94a3b8}
.quiz-result-msg{font-size:16px;color:#e2e8f0;margin-top:12px;font-weight:600}
</style>
</head>

const nodes = [];
const edges = [];
const nodeMap = {};
let nid = 0;

function addNode(id, label, type, extra={}) {
  if (nodeMap[id]) return nodeMap[id];
  const n = {id, label, type, ...extra, x:0, y:0, vx:0, vy:0, fx:null, fy:null, _id:nid++};
  nodes.push(n);
  nodeMap[id] = n;
  return n;
}
function addEdge(a, b, type, strength=1) {
  if (!nodeMap[a] || !nodeMap[b]) return;
  edges.push({source:nodeMap[a], target:nodeMap[b], type, strength});
}

const canvas = document.getElementById('c');

let W, H, dpr;

// ── SIMULATION ────────────────────────────────────
const SIM = {alpha:1, alphaDecay:.003, alphaMin:.001, velDecay:.88};

function tick() {
  // Center gravity
  nodes.forEach(n => {
    n.vx += (cx - n.x) * .0008;
    n.vy += (cy - n.y) * .0008;
  });

  // Edge spring forces
  edges.forEach(e => {
    const dx = e.target.x - e.source.x, dy = e.target.y - e.source.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ideal = e.type === 'story' ? 160 : e.type === 'category' ? 130 : e.type === 'antonym' ? 180 : 90;
    const f = (dist - ideal) * .003 * e.strength * SIM.alpha;
    const fx = dx / dist * f, fy = dy / dist * f;
    e.source.vx += fx; e.source.vy += fy;
    e.target.vx -= fx; e.target.vy -= fy;
  });

  // Repulsion (Barnes-Hut would be better but N is small)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist2 = dx*dx + dy*dy;
      if (dist2 < 1) { dx = Math.random()-.5; dy = Math.random()-.5; dist2 = 1; }
      const minDist = (a.radius||12) + (b.radius||12) + 30;
      const repulse = Math.min(800 / dist2, 2) * SIM.alpha;
      const dist = Math.sqrt(dist2);
      a.vx -= dx/dist * repulse;
      a.vy -= dy/dist * repulse;
      b.vx += dx/dist * repulse;
      b.vy += dy/dist * repulse;

      // Hard collision
      if (dist < minDist) {
        const push = (minDist - dist) * .5;
        a.vx -= dx/dist * push * .05;
        a.vy -= dy/dist * push * .05;
        b.vx += dx/dist * push * .05;
        b.vy += dy/dist * push * .05;
      }
    }
  }

  // Integrate
  nodes.forEach(n => {
    if (n.fx !== null) { n.x = n.fx; n.y = n.fy; n.vx = 0; n.vy = 0; return; }
    n.vx *= SIM.velDecay;
    n.vy *= SIM.velDecay;
    n.x += n.vx;
    n.y += n.vy;
    // Bounds
    const pad = 40;
    n.x = Math.max(pad, Math.min(W - pad, n.x));
    n.y = Math.max(pad + 40, Math.min(H - pad, n.y));
  });

  SIM.alpha = Math.max(SIM.alphaMin, SIM.alpha - SIM.alphaDecay);
}

// ── RENDER ────────────────────────────────────────
let selectedNode = null;
let hoverNode = null;
let time = 0;

function isConnected(n) {
  if (!selectedNode) return true;
  if (n === selectedNode) return true;
  return edges.some(e =>
    (e.source === selectedNode && e.target === n) ||
    (e.target === selectedNode && e.source === n)
  );
}

function edgeConnected(e) {
  if (!selectedNode) return true;
  return e.source === selectedNode || e.target === selectedNode;
}

function draw() {
  time += .016;
  ctx.clearRect(0, 0, W, H);

  // Background subtle grid
  ctx.strokeStyle = 'rgba(51,65,85,.12)';
  ctx.lineWidth = 1;
  const gs = 60;
  for (let x = gs; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = gs; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Edges
  edges.forEach(e => {
    const connected = edgeConnected(e);
    const alpha = selectedNode ? (connected ? 1 : .06) : 1;

    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);

    if (e.type === 'antonym') {
      ctx.strokeStyle = `rgba(239,68,68,${.6 * alpha})`;
      ctx.lineWidth = connected && selectedNode ? 2.5 : 2;
      ctx.setLineDash([6, 4]);
    } else if (e.type === 'sentence') {
      ctx.strokeStyle = `rgba(71,85,105,${.2 * alpha})`;
      ctx.lineWidth = .8;
      ctx.setLineDash([]);
    } else if (e.type === 'story') {
      const c = e.target.color || e.source.color || COLORS.story;
      ctx.strokeStyle = hexToRgba(c, .15 * alpha);
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
    } else {
      ctx.strokeStyle = `rgba(124,58,237,${.12 * alpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Nodes
  nodes.forEach(n => {
    const connected = isConnected(n);
    const isHover = n === hoverNode;
    const isSelected = n === selectedNode;
    const baseAlpha = selectedNode ? (connected ? 1 : .12) : 1;
    const r = n.radius || 12;

    // Glow
    if ((connected || !selectedNode) && n.type !== 'word') {
      const glow = ctx.createRadialGradient(n.x, n.y, r * .5, n.x, n.y, r * 2.5);
      glow.addColorStop(0, hexToRgba(n.color, .2 + Math.sin(time * 1.5 + n._id) * .05));
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(n.x, n.y, r * 2.5, 0, Math.PI * 2); ctx.fill();
    }

    // Word node subtle glow on hover/select
    if (n.type === 'word' && (isHover || isSelected)) {
      const glow = ctx.createRadialGradient(n.x, n.y, r * .3, n.x, n.y, r * 2);
      glow.addColorStop(0, hexToRgba(n.color, .3));
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(n.x, n.y, r * 2, 0, Math.PI * 2); ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    const fillAlpha = baseAlpha * (isHover ? 1 : .85);
    ctx.fillStyle = hexToRgba(n.color, fillAlpha);
    ctx.fill();

    // Border
    if (isSelected) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
    } else if (isHover) {
      ctx.lineWidth = 2;
      ctx.strokeStyle = hexToRgba(n.color, 1);
      ctx.stroke();
    } else if (n.type !== 'word') {
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = hexToRgba(n.color, .5 * baseAlpha);
      ctx.stroke();
    }

    // Label
    if (baseAlpha < .2) return;
    ctx.globalAlpha = baseAlpha;
    if (n.type === 'story') {
      ctx.font = 'bold 13px -apple-system, sans-serif';
      ctx.fillStyle = '#f1f5f9';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y);
    } else if (n.type === 'category') {
      ctx.font = 'bold 12px -apple-system, sans-serif';
      ctx.fillStyle = '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y - 1);
      ctx.font = '9px -apple-system, sans-serif';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText(n.sub, n.x, n.y + 11);
    } else {
      ctx.font = '11px -apple-system, sans-serif';
      ctx.fillStyle = '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(n.label, n.x, n.y + r + 4);
      if (n.romaji) {
        ctx.font = 'italic 8px -apple-system, sans-serif';
        ctx.fillStyle = 'rgba(167,139,250,.7)';
        ctx.fillText(n.romaji, n.x, n.y + r + 17);
      }
    }
    ctx.globalAlpha = 1;
  });

  // Antonym labels
  edges.forEach(e => {
    if (e.type !== 'antonym') return;
    if (selectedNode && !edgeConnected(e)) return;
    const mx = (e.source.x + e.target.x) / 2;
    const my = (e.source.y + e.target.y) / 2;
    ctx.font = '9px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(239,68,68,.7)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('↔', mx, my);
  });
}

function hexToRgba(hex, a) {
  if (hex.startsWith('rgba')) {
    return hex.replace(/[\d.]+\)$/, a + ')');
  }
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

let dragNode = null;
let isDragging = false;
const tooltip = document.getElementById('tooltip');

function getNode(x, y) {
  // Reverse order to pick top node
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const r = (n.radius || 12) + 6;
    if ((n.x-x)**2 + (n.y-y)**2 < r*r) return n;
  }
  return null;
}

  urashimataro:'浦島太郎', kintaro:'金太郎', issunboshi:'一寸法師'
};

function showTooltip(n, px, py) {
  if (!n || n.type === 'story' || n.type === 'category') {
    tooltip.style.opacity = 0;
    return;
  }
  tooltip.querySelector('.tt-word').textContent = n.label;
  tooltip.querySelector('.tt-romaji').textContent = n.romaji || '';
  tooltip.querySelector('.tt-reading').textContent = n.reading || '(kana)';
  tooltip.querySelector('.tt-meaning').textContent = n.meaning || '';
  const sNames = (n.stories||[]).map(s => storyNames[s] || s).join(', ');
  tooltip.querySelector('.tt-cat').textContent = sNames;
  tooltip.style.opacity = 1;
  // Position
  let tx = px + 16, ty = py - 10;
  if (tx + 220 > W) tx = px - 230;
  if (ty + 100 > H) ty = py - 100;
  if (ty < 10) ty = 10;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

canvas.addEventListener('pointerdown', e => {
  const n = getNode(e.clientX, e.clientY);
  if (n) {
    dragNode = n;
    isDragging = false;
    n.fx = n.x; n.fy = n.y;
    SIM.alpha = Math.max(SIM.alpha, .1);
  }
});

canvas.addEventListener('pointermove', e => {
  if (dragNode) {
    isDragging = true;
    dragNode.fx = e.clientX;
    dragNode.fy = e.clientY;
    dragNode.x = e.clientX;
    dragNode.y = e.clientY;
    SIM.alpha = Math.max(SIM.alpha, .05);
  }
  const n = getNode(e.clientX, e.clientY);
  hoverNode = n;
  canvas.style.cursor = n ? 'pointer' : 'default';
  showTooltip(n, e.clientX, e.clientY);
});

canvas.addEventListener('pointerup', e => {
  if (dragNode) {
    if (!isDragging) {
      // Click
      if (selectedNode === dragNode) {
        selectedNode = null;
      } else {
        selectedNode = dragNode;
      }
    }
    dragNode.fx = null; dragNode.fy = null;
    dragNode = null;
    SIM.alpha = Math.max(SIM.alpha, .3);
  }
});

canvas.addEventListener('pointerleave', () => {
  hoverNode = null;
  tooltip.style.opacity = 0;
});

// Click background to deselect
canvas.addEventListener('click', e => {
  if (!getNode(e.clientX, e.clientY)) {
    selectedNode = null;
  }
});

// Reset button
document.getElementById('btn-reset').addEventListener('click', () => {
  SIM.alpha = 1;
  selectedNode = null;
  nodes.forEach((n, i) => {
    const angle = (i / nodes.length) * Math.PI * 2;
    const r = 150 + Math.random() * 200;
    n.x = cx + Math.cos(angle) * r;
    n.y = cy + Math.sin(angle) * r;
    n.vx = 0; n.vy = 0; n.fx = null; n.fy = null;
  });
});

// Touch support
canvas.addEventListener('touchstart', e => e.preventDefault(), {passive:false});

// ── ANIMATE ───────────────────────────────────────
function loop() {
  tick();
  draw();
  requestAnimationFrame(loop);
}

// Add some floating particles for atmosphere
const particles = Array.from({length:40}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3,
  r: Math.random() * 1.5 + .5,
  a: Math.random() * .3 + .1
}));

const _origDraw = draw;
draw = function() {
  _origDraw();
  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(124,58,237,${p.a * (.5 + .5 * Math.sin(time * 2 + p.x))})`;
    ctx.fill();
  });
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

// Quiz type labels
const quizTypeLabels = {
  fillBlank: "📝 穴埋め（あなうめ）",
  antonym: "↔️ 反対語（はんたいご）",
  category: "📂 仲間分け（なかまわけ）",
  storyContext: "📖 物語（ものがたり）",
  sceneAssoc: "🔗 場面（ばめん）",
};

let quizState = null;

function generateQuizQuestions() {
  // Generate 10 questions randomly mixed from all 5 types
  // Aim for 2 of each type
  const questions = [];

  const fb = shuffle(fillBlankData).slice(0, 2).map(q => ({type:'fillBlank', data:q}));
  const an = shuffle(antonymQuizData).slice(0, 2).map(q => ({type:'antonym', data:q}));
  const ca = shuffle(categoryQuizData).slice(0, 2).map(q => ({type:'category', data:q}));
  const sc = shuffle(storyContextData).slice(0, 2).map(q => ({type:'storyContext', data:q}));
  const sa = shuffle(sceneAssocData).slice(0, 2).map(q => ({type:'sceneAssoc', data:q}));

  questions.push(...fb, ...an, ...ca, ...sc, ...sa);
  return shuffle(questions);
}

function findNodeByWord(word) {
  const wid = "w_" + word;
  return nodeMap[wid] || null;
}

function openQuiz() {
  quizOverlay.style.display = 'flex';
  requestAnimationFrame(() => quizOverlay.classList.add('active'));
  showQuizStart();
}

function closeQuiz() {
  quizOverlay.classList.remove('active');
  setTimeout(() => { quizOverlay.style.display = 'none'; }, 300);
  quizHighlightNode = null;
  quizHighlightEdges = false;
  quizState = null;
  selectedNode = null;
}

document.getElementById('quiz-close-btn').addEventListener('click', closeQuiz);
quizOverlay.addEventListener('click', e => { if (e.target === quizOverlay) closeQuiz(); });
document.getElementById('btn-quiz').addEventListener('click', openQuiz);

function startQuiz() {
  const questions = generateQuizQuestions();
  quizState = { questions, current:0, score:0, total:questions.length };
  showQuizQuestion();
}

function renderProgressBar() {
  const pct = ((quizState.current) / quizState.total) * 100;
  return `<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>`;
}

function showQuizQuestion() {
  const qi = quizState.questions[quizState.current];
  const typeLabel = quizTypeLabels[qi.type];

  // Try to highlight relevant node
  let highlightWord = null;
  if (qi.type === 'fillBlank') highlightWord = qi.data.answer;
  else if (qi.type === 'antonym') highlightWord = qi.data.word;
  else if (qi.type === 'sceneAssoc') highlightWord = qi.data.word;
  else if (qi.type === 'storyContext') highlightWord = qi.data.answer;
  else if (qi.type === 'category') highlightWord = qi.data.answer;

  const wNode = findNodeByWord(highlightWord);
  if (wNode) {
    quizHighlightNode = wNode;
    selectedNode = wNode;
    SIM.alpha = Math.max(SIM.alpha, .15);
  } else {
    quizHighlightNode = null;
    selectedNode = null;
  }
  quizHighlightEdges = false;

  let questionHTML = '';
  let choices = [];
  let correctAnswer = '';

  switch (qi.type) {
    case 'fillBlank': {
      const d = qi.data;
      correctAnswer = d.answer;
      const allAnswers = fillBlankData.map(x => x.answer);
      const distractors = shuffle(allAnswers.filter(a => a !== d.answer)).slice(0, 3);
      choices = shuffle([d.answer, ...distractors]);
      const sentenceHtml = d.sentence.replace('＿＿', '<span class="blank">＿＿＿</span>');
      questionHTML = `
        <div class="quiz-sentence">${sentenceHtml}</div>
        <div class="kr-sub" style="text-align:center;font-size:12px">${d.explain ? d.explain.replace(d.answer, '＿＿') : ''}</div>
        <div class="quiz-prompt">＿＿に　はいる　ことばは？</div>
      `;
      break;
    }
    case 'antonym': {
      const d = qi.data;
      correctAnswer = d.answer;
      const allAntAnswers = antonymQuizData.map(x => x.answer);
      const vocabWords = vocabRaw.map(v => v.w);
      const pool = [...new Set([...allAntAnswers, ...vocabWords])].filter(a => a !== d.answer && a !== d.word);
      const distractors = shuffle(pool).slice(0, 3);
      choices = shuffle([d.answer, ...distractors]);
      questionHTML = `
        <div class="quiz-word">${d.word}${kr(d.word) ? `<div class="kr-sub" style="font-size:13px;text-align:center">${kr(d.word)}</div>` : ''}</div>
        <div class="quiz-prompt">はんたいの　ことばは？</div>
      `;
      break;
    }
    case 'category': {
      const d = qi.data;
      correctAnswer = d.answer;
      choices = shuffle([...d.choices]);
      questionHTML = `
        <div class="quiz-prompt" style="font-size:16px;margin:16px 0">${d.questionJp}</div>
        <div class="kr-sub" style="text-align:center;font-size:12px">${d.question}</div>
      `;
      break;
    }
    case 'storyContext': {
      const d = qi.data;
      correctAnswer = d.answer;
      choices = shuffle([...d.choices]);
      questionHTML = `
        <div class="quiz-prompt" style="font-size:16px;margin:16px 0">${d.questionJp}</div>
        <div class="kr-sub" style="text-align:center;font-size:12px">${d.question}</div>
      `;
      break;
    }
    case 'sceneAssoc': {
      const d = qi.data;
      correctAnswer = d.answer;
      choices = shuffle([...d.choices]);
      questionHTML = `
        <div class="quiz-word">${d.word}${kr(d.word) ? `<div class="kr-sub" style="font-size:13px;text-align:center">${kr(d.word)}</div>` : ''}</div>
        <div class="quiz-prompt">${d.questionJp}</div>
        <div class="kr-sub" style="text-align:center;font-size:12px">${d.question}</div>
      `;
      break;
    }
  }

  quizContent.innerHTML = `
    ${renderProgressBar()}
    <div class="quiz-score">${quizState.current + 1} / ${quizState.total}　|　スコア: ${quizState.score}</div>
    <div class="quiz-type-label">${typeLabel}</div>
    ${questionHTML}
    <div class="quiz-choices">
      ${choices.map((c, i) => `<button class="quiz-choice" data-idx="${i}" data-val="${escHtml(c)}">${c}${kr(c) ? `<div class="kr-sub">${kr(c)}</div>` : ''}</button>`).join('')}
    </div>
  `;

  quizContent.querySelectorAll('.quiz-choice').forEach(btn => {
    btn.addEventListener('click', () => handleQuizAnswer(btn, correctAnswer, qi));
  });
}

function handleQuizAnswer(btn, correct, qi) {
  const val = btn.dataset.val;
  const isCorrect = val === correct;
  if (isCorrect) quizState.score++;

  // Disable all buttons and show correct/wrong
  quizContent.querySelectorAll('.quiz-choice').forEach(b => {
    b.style.pointerEvents = 'none';
    const bVal = b.dataset.val;
    if (bVal === correct) b.classList.add('correct');
    if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  // Highlight connections on graph
  quizHighlightEdges = true;
  quizHighlightTime = time;

  // If correct, make node glow brighter
  if (isCorrect && quizHighlightNode) {
    SIM.alpha = Math.max(SIM.alpha, .3);
  }

  // Build explanation
  const footer = document.createElement('div');
  footer.className = 'quiz-footer';
  footer.style.flexDirection = 'column';
  footer.style.gap = '10px';

  const resultLine = document.createElement('div');
  resultLine.style.cssText = 'font-size:13px;font-weight:700;text-align:center';
  if (isCorrect) {
    resultLine.textContent = 'せいかい！ ✓';
    resultLine.style.color = '#10b981';
  } else {
    resultLine.innerHTML = 'ざんねん！ こたえ: <span style="color:#fcd34d">' + correct + '</span>';
    resultLine.style.color = '#ef4444';
  }
  footer.appendChild(resultLine);

  // Romaji hint
  const romajiHint = document.createElement('div');
  romajiHint.style.cssText = 'text-align:center;font-size:12px;color:#a78bfa;font-style:italic';
  romajiHint.textContent = qi.data.romaji ? '(' + qi.data.romaji + ')' : '';
  footer.appendChild(romajiHint);

  // Korean explanation (shown via global kr-toggle)
  const krExplain = qi.data.explain || '';
  if (krExplain) {
    const krText = document.createElement('div');
    krText.className = 'kr-sub quiz-explanation';
    krText.style.textAlign = 'center';
    krText.textContent = krExplain;
    footer.appendChild(krText);
  }

  // Next button
  const nextRow = document.createElement('div');
  nextRow.style.cssText = 'display:flex;justify-content:flex-end;margin-top:4px';
  const nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-btn primary';
  nextBtn.textContent = quizState.current < quizState.total - 1 ? 'つぎへ →' : 'けっか';
  nextBtn.addEventListener('click', () => {
    quizState.current++;
    if (quizState.current < quizState.total) {
      showQuizQuestion();
    } else {
      showQuizResults();
    }
  });
  nextRow.appendChild(nextBtn);
  footer.appendChild(nextRow);
  quizContent.appendChild(footer);
}

function showQuizResults() {
  quizHighlightNode = null;
  quizHighlightEdges = false;
  selectedNode = null;

  const pct = Math.round((quizState.score / quizState.total) * 100);
  let msg = '';
  let emoji = '';
  if (pct === 100) { msg = 'かんぺき！　すばらしい！'; emoji = '🎉'; }
  else if (pct >= 80) { msg = 'すごい！　もうすこしで　かんぺき！'; emoji = '🌟'; }
  else if (pct >= 60) { msg = 'よくできました！　もうすこし　れんしゅう！'; emoji = '👍'; }
  else if (pct >= 40) { msg = 'がんばって！　つづけましょう！'; emoji = '💪'; }
  else { msg = 'もういちど　チャレンジ！　できる！'; emoji = '🔥'; }

  quizContent.innerHTML = `
    <div class="quiz-title">クイズ　おわり！</div>
    <div class="quiz-result">
      <div style="font-size:48px;margin-bottom:8px">${emoji}</div>
      <div class="quiz-result-label">スコア</div>
      <div class="quiz-result-score">${quizState.score} / ${quizState.total}</div>
      <div class="quiz-result-label">${pct}%</div>
      <div class="quiz-result-msg">${msg}</div>
    </div>
    <div class="quiz-footer" style="justify-content:center;gap:12px">
      <button class="quiz-btn" id="quiz-retry">もういちど</button>
      <button class="quiz-btn primary" id="quiz-back-menu">はじめに　もどる</button>
    </div>
  `;
  document.getElementById('quiz-retry').addEventListener('click', startQuiz);
  document.getElementById('quiz-back-menu').addEventListener('click', showQuizStart);
}

// Override draw to add quiz highlight effect
const _quizOrigDraw = draw;
draw = function() {
  _quizOrigDraw();

  // Draw highlight ring around quiz node
  if (quizHighlightNode) {
    const n = quizHighlightNode;
    const pulse = Math.sin(time * 4) * 0.3 + 0.7;
    const r = (n.radius || 12) + 8;

    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(245,158,11,${pulse * 0.6})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 10, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(245,158,11,${pulse * 0.25})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Briefly highlight edges after answering
  if (quizHighlightEdges && quizHighlightNode) {
    const elapsed = time - quizHighlightTime;
    if (elapsed < 2) {
      const fadeAlpha = Math.max(0, 1 - elapsed / 2);
      edges.forEach(e => {
        if (e.source === quizHighlightNode || e.target === quizHighlightNode) {
          ctx.beginPath();
          ctx.moveTo(e.source.x, e.source.y);
          ctx.lineTo(e.target.x, e.target.y);
          ctx.strokeStyle = `rgba(245,158,11,${fadeAlpha * 0.5})`;
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
      });
    }
  }
};

loop();
</script>
